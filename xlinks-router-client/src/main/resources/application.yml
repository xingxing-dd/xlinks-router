server:
  port: 8082

spring:
  application:
    name: xlinks-router-client
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://123.60.29.123:3306/xlinks_router?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 132311aA.
  data:
    redis:
      host: 123.60.29.123
      port: 6379
      password: 132311aA.
      database: 0

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: site.xlinks.ai.router.entity
  configuration:
    map-underscore-to-camel-case: true
    # 禁用 MyBatis 控制台 SQL 输出（避免 StdOutImpl 打印 SQL）
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: auto

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none
  api-docs:
    path: /v3/api-docs
    enabled: true
  packages-to-scan: site.xlinks.ai.router
  paths-to-match: /**

logging:
  level:
    site.xlinks.ai.router: DEBUG
    org.springframework: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

xlinks:
  # 邀请有礼链接
  promotion:
    referral-link-prefix: https://ai.xlinks.site/register?ref=
  sms:
    guoyangyun:
      host: https://gyytz.market.alicloudapi.com
      path: /sms/smsSend
      appcode: ${XLS_SMS_GYY_APP_CODE:5cf9ca38f0a94f019cb432071a715284}
      smsSignId: ${XLS_SMS_GYY_SIGN_ID:2e65b1bb3d054466b82f0c9d125465e2}
      templateId: ${XLS_SMS_GYY_TEMPLATE_ID:908e94ccf08b4476ba6c876d13f084ad}
    verify-code:
      expire-seconds: 300
      daily-limit: 20
      min-interval-seconds: 60
  email:
    brevo:
      access-token: ${XLS_EMAIL_BREVO_ACCESS_TOKEN:}
      sender-email: ${XLS_EMAIL_BREVO_SENDER_EMAIL:xingxingdd132311@gmail.com}
      sender-name: ${XLS_EMAIL_BREVO_SENDER_NAME:xlinks-tech}
      api-url: ${XLS_EMAIL_BREVO_API_URL:https://api.brevo.com/v3/smtp/email}
      enabled: true

# 支付宝配置
alipay:
  # 沙箱环境配置
  sandbox:
    enabled: true
    app-id: ${ALIPAY_SANDBOX_APP_ID:9021000162659038}
    private-key: ${ALIPAY_SANDBOX_PRIVATE_KEY:}
    public-key: ${ALIPAY_SANDBOX_PUBLIC_KEY:}
    alipay-public-key: ${ALIPAY_SANDBOX_ALIPAY_PUBLIC_KEY:}
    gateway-url: https://openapi-sandbox.dl.alipaydev.com/gateway.do
    charset: UTF-8
    sign-type: RSA2
    format: json
    # 回调地址配置
    return-url: https://ai.xlinks.site/alipay/return
    notify-url: https://ai.xlinks.site/alipay/notify
    #payment-success-url: http://localhost:5173/payment/success
    #payment-error-url: http://localhost:5173/payment/error
    payment-success-url: https://ai.xlinks.site/alipay/payment/success
    payment-error-url: https://ai.xlinks.site/alipay/payment/error
  # 正式环境配置（预留）
  production:
    enabled: false
    app-id: ${ALIPAY_APP_ID:}
    private-key: ${ALIPAY_PRIVATE_KEY:}
    public-key: ${ALIPAY_PUBLIC_KEY:}
    alipay-public-key: ${ALIPAY_ALIPAY_PUBLIC_KEY:}
    gateway-url: https://openapi.alipay.com/gateway.do
    charset: UTF-8
    sign-type: RSA2
    format: json
    return-url: ${ALIPAY_RETURN_URL:https://ai.xlinks.site/alipay/return}
    notify-url: ${ALIPAY_NOTIFY_URL:https://ai.xlinks.site/alipay/notify}
    payment-success-url: ${ALIPAY_PAYMENT_SUCCESS_URL:https://ai.xlinks.site/payment/success}
    payment-error-url: ${ALIPAY_PAYMENT_ERROR_URL:https://ai.xlinks.site/payment/error}

