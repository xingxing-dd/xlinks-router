# 支付宝沙箱环境配置示例
# 请将以下配置添加到你的环境变量或 application.yml 中

# 沙箱环境配置
ALIPAY_SANDBOX_APP_ID=your-sandbox-app-id
ALIPAY_SANDBOX_PRIVATE_KEY=your-private-key
ALIPAY_SANDBOX_PUBLIC_KEY=your-public-key
ALIPAY_SANDBOX_ALIPAY_PUBLIC_KEY=your-alipay-public-key

# 配置说明：
# 1. APP_ID: 支付宝开放平台申请的应用ID
# 2. PRIVATE_KEY: 商户私钥（RSA2格式）
# 3. PUBLIC_KEY: 商户公钥（RSA2格式）
# 4. ALIPAY_PUBLIC_KEY: 支付宝公钥（从支付宝开放平台获取）

# 密钥格式示例：
# -----BEGIN PRIVATE KEY-----
# MIIEvQIBADANBgkqhkiG9w0BAQEFAASCBKcwggSjAgEAAoIBAQC...
# -----END PRIVATE KEY-----

# 测试账号获取：
# 1. 登录支付宝开放平台：https://open.alipay.com/
# 2. 进入沙箱环境
# 3. 获取沙箱账号信息
# 4. 下载密钥生成工具生成RSA2密钥对
# 5. 上传商户公钥并获取支付宝公钥
