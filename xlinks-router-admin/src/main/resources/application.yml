# SpringDoc OpenAPI 配置
#springdoc:
#  api-docs:
#    enabled: true
#    path: /v3/api-docs
#  swagger-ui:
#    enabled: true
#    path: /swagger-ui.html
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none
  api-docs:
    path: /v3/api-docs
    enabled: true
  packages-to-scan: site.xlinks.ai.router
  paths-to-match: /**


# 日志配置
logging:
  level:
    site.xlinks.ai.router: DEBUG
    org.springframework: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
