mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: site.xlinks.ai.router.entity
  configuration:
    map-underscore-to-camel-case: true
    # Disable MyBatis SQL stdout logging.
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: auto

app:
  security:
    token-encrypt-key: ${TOKEN_ENCRYPT_KEY:}
  api:
    timeout: 30000
    retry-count: 3

springdoc:
  api-docs:
    enabled: false
    path: /v3/api-docs
  swagger-ui:
    enabled: false
    path: /swagger-ui.html

logging:
  level:
    site.xlinks.ai.router: DEBUG
    org.springframework: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

xlinks:
  router:
    sse:
      timeout-ms: 900000
    cache:
      refresh-interval-ms: 300000
    quota-reset:
      cron: "0 0 0 * * ?"
      zone: "Asia/Shanghai"
    auth:
      token-cache-ttl-seconds: 15
      internal-cache-refresh-token: ${INTERNAL_CACHE_REFRESH_TOKEN:6f5df376e71a4801bb7b7006e0988c7e}
    forward:
      user-agent: "codex-tui/0.125.0 (Mac OS 26.3.1; arm64) zed/0.231.2_stable.221.cc335b70f85a17974a4c61f852dbebff8c4b1db8 (codex-tui; 0.125.0)"
    debug:
      log-upstream-responses-stream-payload: false
      trace-timeline-enabled: true
      trace-stream-event-preview-limit: 120
      trace-log-provider-token-plain: false
    async:
      usage:
        core-size: 4
        max-size: 16
        queue-capacity: 1000
      sse:
        core-size: 8
        max-size: 64
        queue-capacity: 2000
      permit-renew:
        pool-size: 4
    limits:
      default-max-concurrent-per-token: 0
      default-acquire-timeout-ms: 0
      default-request-timeout-ms: 20000
      default-stream-first-response-timeout-ms: 20000
      default-stream-idle-timeout-ms: 20000
      default-session-lease-ms: 30000
      default-session-renew-interval-ms: 10000
    okhttp:
      connect-timeout-seconds: 10
      read-timeout-seconds: 120
      write-timeout-seconds: 120
      max-idle-connections: 64
      keep-alive-minutes: 5
      max-requests: 512
      max-requests-per-host: 128
