server:
  port: 8081

spring:
  application:
    name: xlinks-router-api
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://123.60.29.123:3306/xlinks_router?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 132311aA.
    hikari:
      idleTimeout: 300000
  data:
    redis:
      host: 123.60.29.123
      port: 6379
      password: 132311aA.
      database: 0

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: site.xlinks.ai.router.entity
  configuration:
    map-underscore-to-camel-case: true
    # 禁用 MyBatis 控制台 SQL 输出（避免 StdOutImpl 打印 SQL）
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: auto

# 应用配置
app:
  security:
    token-encrypt-key: ${TOKEN_ENCRYPT_KEY:}
  api:
    timeout: 30000
    retry-count: 3

# SpringDoc OpenAPI 配置
springdoc:
  api-docs:
    enabled: false
    path: /v3/api-docs
  swagger-ui:
    enabled: false
    path: /swagger-ui.html

# 日志配置
logging:
  level:
    site.xlinks.ai.router: DEBUG
    org.springframework: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
